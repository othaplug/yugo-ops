name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.e30.placeholder
      SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.service-role-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SUPER_ADMIN_EMAIL: ci@example.com
      TRACK_SIGNING_SECRET: "01234567890123456789012345678901"
      CREW_SESSION_SECRET: "01234567890123456789012345678901"
      CRON_SECRET: "01234567890123456789012345678901"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
